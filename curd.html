<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD App - Manage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { 
            text-align: center; color: white; margin-bottom: 40px;
            position: relative;
        }
        .header h1 { font-size: 2.8em; margin-bottom: 10px; text-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .back-btn { 
            position: absolute; left: 0; top: 0; 
            width: 60px; height: 60px; border-radius: 50%; 
            background: rgba(255,255,255,0.2); color: white; 
            border: none; font-size: 1.5em; cursor: pointer;
            transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        .form-container { 
            background: rgba(255,255,255,0.1); 
            border-radius: 40px; padding: 40px; 
            backdrop-filter: blur(20px); margin-bottom: 30px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        input, select { 
            width: 100%; height: 60px; padding: 0 20px; 
            border: none; border-radius: 30px; font-size: 16px;
            background: rgba(255,255,255,0.9); box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn { 
            height: 60px; padding: 0 30px; border: none; 
            border-radius: 30px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; color: white;
        }
        .btn-primary { background: linear-gradient(45deg, #4ecdc4, #44a08d); }
        .btn-success { background: linear-gradient(45deg, #4CAF50, #45a049); }
        .btn-danger { background: linear-gradient(45deg, #f44336, #da190b); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .record-card { 
            background: rgba(255,255,255,0.9); border-radius: 25px; 
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .record-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .edit-btn, .delete-btn { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: none; margin: 0 5px; cursor: pointer; color: white;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .nav { text-align: center; margin-top: 30px; }
        .nav a { color: white; text-decoration: none; margin: 0 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="location.href='index.html'">←</button>
            <h1>✏️ Manage Records</h1>
        </div>

        <div class="form-container">
            <div class="form-row">
                <input type="text" id="name" placeholder="Name">
                <input type="text" id="email" placeholder="Email">
            </div>
            <div class="form-row">
                <input type="text" id="phone" placeholder="Phone">
                <select id="status">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr auto auto; gap: 15px;">
                <input type="text" id="editId" placeholder="Edit ID (leave empty to create)" style="display: none;">
                <button class="btn btn-primary" onclick="saveRecord()">💾 Save Record</button>
                <button class="btn btn-success" onclick="clearForm()">🧹 Clear</button>
            </div>
        </div>

        <div class="records-grid" id="recordsGrid"></div>

        <div class="nav">
            <a href="index.html">📊 Dashboard</a>
            <a href="view.html">📋 View All</a>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('crudData')) || [];
        let editingId = null;

        function saveToStorage() {
            localStorage.setItem('crudData', JSON.stringify(records));
        }

        function renderRecords() {
            const grid = document.getElementById('recordsGrid');
            grid.innerHTML = '';
            records.filter(r => !r.deleted).forEach((record, index) => {
                const card = document.createElement('div');
                card.className = 'record-card';
                card.innerHTML = `
                    <h3>${record.name}</h3>
                    <p><strong>Email:</strong> ${record.email}</p>
                    <p><strong>Phone:</strong> ${record.phone}</p>
                    <p><strong>Status:</strong> <span style="color: ${record.status === 'active' ? '#4CAF50' : '#f44336'}">${record.status}</span></p>
                    <div>
                        <button class="edit-btn" style="background: #2196F3;" onclick="editRecord(${index})">✏️</button>
                        <button class="delete-btn" style="background: #f44336;" onclick="deleteRecord(${index})">🗑️</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function saveRecord() {
            const record = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                status: document.getElementById('status').value,
                deleted: false
            };

            if (editingId !== null && editingId !== '') {
                records[editingId] = record;
            } else {
                records.push(record);
            }
            saveToStorage();
            clearForm();
            renderRecords();
        }

        function editRecord(index) {
            const record = records[index];
            document.getElementById('name').value = record.name;
            document.getElementById('email').value = record.email;
            document.getElementById('phone').value = record.phone;
            document.getElementById('status').value = record.status;
            editingId = index;
        }

        function deleteRecord(index) {
            if (confirm('Delete this record?')) {
                records[index].deleted = true;
                saveToStorage();
                renderRecords();
            }
        }

        function clearForm() {
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('status').value = 'active';
            editingId = null;
        }

        renderRecords();
    </script>
</body>
</html>
